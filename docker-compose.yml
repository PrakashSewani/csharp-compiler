services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./files:/app/files
      - csharp-exec-workspace:/exec-workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FILES_DIR=/app/files
      - EXEC_WORKSPACE=/exec-workspace
      - SANDBOX_IMAGE=csharp-sandbox
    depends_on:
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/solutions"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  sandbox:
    build: ./sandbox
    image: csharp-sandbox
    command: "tail -f /dev/null"
    healthcheck:
      test: ["CMD", "dotnet", "--version"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  csharp-exec-workspace:
    name: csharp-exec-workspace
